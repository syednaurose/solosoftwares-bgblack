<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="dark-multi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />   <stop offset="50%" stop-color="#0f172a" />  <stop offset="100%" stop-color="#042f2e" /> </linearGradient>

    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="40%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <g filter="url(#shadow)" transform="translate(256, 256) scale(1.35) translate(-252, -238)">
    
    <path d="M 340 180 
             C 340 146, 300 130, 256 130 
             C 190 130, 140 170, 140 220 
             C 140 250, 165 278, 205 290 
             L 180 340 
             L 235 322 
             C 242 324, 249 325, 256 325 
             C 310 325, 350 295, 350 255 
             C 350 240, 342 220, 325 210
             C 300 195, 250 215, 220 195
             C 205 185, 210 165, 245 165
             C 280 165, 305 175, 315 185" 
          fill="url(#dark-multi-grad)" 
          stroke="url(#primary-grad)" 
          stroke-width="26" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <g stroke-linecap="round" stroke-linejoin="round">
      <line x1="250" y1="243" x2="295" y2="243" stroke="#38bdf8" stroke-width="8" />
      
      <line x1="240" y1="255" x2="305" y2="255" stroke="#38bdf8" stroke-width="10" filter="url(#neon-glow)" />
      <line x1="240" y1="255" x2="305" y2="255" stroke="#ffffff" stroke-width="4" />
      
      <line x1="255" y1="267" x2="290" y2="267" stroke="#38bdf8" stroke-width="8" />
    </g>

  </g>
</svg>
